<!DOCTYPE html>
<html>
<head>
    <title>Practice Quizzes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Style for formatting the questions nicely */
        .quiz-content {
            white-space: pre-wrap; 
            font-family: 'Courier New', Courier, monospace;
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        .quiz-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Practice Quizzes (Class 9-12)</h1>
    
    <div class="nav-bar">
        <a href="/">Home</a>
        <a href="/videos">Videos</a>
        <a href="/notes">Notes</a>
        <a href="/quizzes">Quizzes</a>
        <a href="/assignments">Assignments</a>
        <a href="/dashboard">Admin</a>
    </div>

    {% if quizzes|length == 0 %}
        <p style="text-align:center; color:#777;">No quizzes uploaded yet. Go to Admin to add content.</p>
    {% endif %}

    <!-- Quiz List -->
    <div style="display: grid; grid-template-columns: 1fr;">
        {% for quiz in quizzes %}
        <div class="quiz-card">
            <span style="background: #fff3cd; color: #856404; padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold;">
                {{ quiz[2] }} <!-- Subject -->
            </span>
            <h3 style="margin: 10px 0;">{{ quiz[1] }}</h3> <!-- Title -->
            
            <div class="quiz-content">{{ quiz[3] }}</div> <!-- Questions -->
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
